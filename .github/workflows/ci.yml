name: ci
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Build is in sync with core/
        run: python3 build/build.py --check
      - name: Smoke test
        run: bash test/smoke_test.sh
      - name: CLI sanity
        run: |
          chmod +x devloop
          ./devloop version
          ./devloop install --dry-run >/dev/null
          ./devloop doctor
